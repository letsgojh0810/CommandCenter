# ontology/abox/commerce-catalog.yaml
# 브랜드·상품 조회·좋아요 도메인. 읽기 허브이며 Redis 캐시로 성능 보장.

domain:
  id: commerce-catalog
  name: 상품 카탈로그
  summary: |
    브랜드와 상품 정보를 제공하는 읽기 도메인.
    상품 목록/상세는 Redis에 캐시(TTL 10분/5분)하며,
    좋아요 이벤트(LikeCreatedEvent/LikeCancelledEvent)로 product.likeCount를 갱신한다.
    Kafka catalog-events를 통해 메트릭·랭킹 도메인에 이벤트를 전달한다.
  wiki_root: wiki/commerce-catalog/

entities:
  - id: brand
    name: 브랜드
    type: data
    summary: |
      테이블 brands. name, description, imageUrl.
      어드민(POST/PUT/DELETE /api-admin/v1/brands)으로 관리.
      사용자 API(GET /api/v1/brands)로 조회.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/brand
    wiki_doc: wiki/commerce-catalog/브랜드/README.md

  - id: product
    name: 상품
    type: data
    summary: |
      테이블 products. brandId, name, description, price, stock, imageUrl, likeCount.
      stock 필드로 재고 직접 관리(decreaseStock/increaseStock 메서드).
      복합 인덱스 6개: (brand_id, created_at), (brand_id, price), (brand_id, like_count) 등.
      정렬: LATEST / PRICE_ASC / LIKES_DESC.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/product
    wiki_doc: wiki/commerce-catalog/상품-조회/README.md

  - id: product-like
    name: 상품 좋아요
    type: data
    summary: |
      테이블 product_likes. userId, productId, createdAt.
      낙관적 락(@Version) 적용으로 동시 좋아요 충돌 방지.
      좋아요/취소 시 LikeCreatedEvent/LikeCancelledEvent 발행 → AFTER_COMMIT에 product.likeCount 갱신.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/like
    wiki_doc: wiki/commerce-catalog/좋아요/README.md

  - id: product-query
    name: 상품 조회
    type: process
    summary: |
      GET /api/v1/products (목록: brandId 필터, sort, page, size),
      GET /api/v1/products/{productId} (상세).
      Redis 캐시: productDetail(TTL 10분), productList(TTL 5분).
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/interfaces/api/product
    wiki_doc: wiki/commerce-catalog/상품-조회/README.md

  - id: like-process
    name: 좋아요 관리
    type: process
    summary: |
      POST /api/v1/products/{productId}/likes (좋아요),
      DELETE /api/v1/products/{productId}/likes (좋아요 취소),
      GET /api/v1/users/{userId}/likes (내 좋아요 목록).
      이벤트를 outbox 경유 Kafka catalog-events 토픽으로 발행.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/interfaces/api/like
    wiki_doc: wiki/commerce-catalog/좋아요/README.md

relations:
  - from: product-query
    to: product
    type: consumes

  - from: product-query
    to: redis
    type: depends_on
    note: productDetail(10분), productList(5분) 캐시

  - from: like-process
    to: product-like
    type: produces

  - from: like-process
    to: product
    type: produces
    note: likeCount 갱신 (LikeEventListener, AFTER_COMMIT)

  - from: like-process
    to: kafka
    type: produces
    note: catalog-events 토픽에 LIKE_CREATED / LIKE_CANCELLED 이벤트 발행 (outbox 경유)

  - from: product
    to: mysql
    type: deployed_in

  - from: brand
    to: mysql
    type: deployed_in

  - from: product-like
    to: mysql
    type: deployed_in
