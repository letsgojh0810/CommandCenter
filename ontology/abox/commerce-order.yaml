# ontology/abox/commerce-order.yaml
# 주문 생성·취소, PG 결제, 쿠폰 발급·사용 도메인.

domain:
  id: commerce-order
  name: 주문·결제·쿠폰
  summary: |
    주문 생성 시 재고 차감 → 쿠폰 사용 → 주문 생성 → 이벤트 발행 순으로 처리.
    PG 결제는 OpenFeign + Resilience4j(CircuitBreaker+Retry)로 연동하며,
    Transactional Outbox로 order-events 토픽에 정확히 한 번 발행을 보장한다.
    쿠폰은 동기 발급(즉시 DB 저장)과 비동기 발급(Kafka 큐잉) 두 가지를 지원한다.
  wiki_root: wiki/commerce-order/

entities:
  # ── data ─────────────────────────────────────────────────────
  - id: order
    name: 주문
    type: data
    summary: |
      테이블 orders. userId, originalAmount, discountAmount, totalAmount,
      userCouponId, deliveryAddress, status(PENDING_PAYMENT→PAID/CANCELLED).
      OrderItem과 @OneToMany(CascadeType.ALL).
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/order
    wiki_doc: wiki/commerce-order/주문-생성/README.md

  - id: order-item
    name: 주문 상품
    type: data
    summary: |
      테이블 order_items. 주문 시점 스냅샷: productId, brandName, productName, price, quantity.
      상품 정보가 이후 변경되어도 주문 당시 내역 보존.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/order
    wiki_doc: wiki/commerce-order/주문-생성/README.md

  - id: payment
    name: 결제
    type: data
    summary: |
      테이블 payments. orderId, userId, cardType, cardNo, amount,
      status(PENDING→SUCCESS/FAILED), pgTransactionId, failureReason.
      CardType: SAMSUNG, KB, HYUNDAI, KAKAO, TOSS, NAVER.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/payment
    wiki_doc: wiki/commerce-order/결제-흐름/README.md

  - id: payment-cancel-request
    name: 결제 취소 요청
    type: data
    summary: |
      테이블 payment_cancel_requests. 결제 취소/환불 요청 이력. orderId, pgTransactionId, status, reason.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/payment

  - id: coupon
    name: 쿠폰 정책
    type: data
    summary: |
      테이블 coupons. name, type(FIXED/RATE), value, minOrderAmount, validDays, totalLimit.
      FIXED: 고정 할인액, RATE: 비율(%) 할인.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/coupon
    wiki_doc: wiki/commerce-order/쿠폰-규칙/README.md

  - id: user-coupon
    name: 사용자 쿠폰
    type: data
    summary: |
      테이블 user_coupons. couponId, userId, status(AVAILABLE→USED/EXPIRED), issuedAt, expiredAt.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/coupon
    wiki_doc: wiki/commerce-order/쿠폰-규칙/README.md

  - id: coupon-issue-request
    name: 쿠폰 발급 요청
    type: data
    summary: |
      테이블 coupon_issue_requests. 비동기 발급 추적. requestId, couponId, userId,
      status(PENDING→SUCCESS/FAILED), failReason.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/coupon
    wiki_doc: wiki/commerce-order/쿠폰-규칙/README.md

  - id: outbox-event
    name: 아웃박스 이벤트
    type: data
    summary: |
      테이블 outbox_events. eventId, topic, partitionKey, payload, status(PENDING→PUBLISHED/FAILED),
      retryCount(max=3), createdAt, publishedAt.
      도메인 이벤트 발생 시 BEFORE_COMMIT에 저장, OutboxScheduler가 1초마다 Kafka로 발행.
      실패 3회 초과 시 DLQ({topic}-dlq)로 전송.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/domain/outbox

  # ── processes ─────────────────────────────────────────────────
  - id: order-placement
    name: 주문 생성
    type: process
    summary: |
      POST /api/v1/orders (X-Entry-Token 헤더 optional).
      흐름: 대기열 토큰 검증 → 재고 차감(product.decreaseStock) → 쿠폰 검증·사용
      → order/order-item 생성 → OrderCreatedEvent(outbox 저장) → 대기열 토큰 삭제.
      GET /api/v1/orders (목록), GET /api/v1/orders/{orderId} (상세).
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/application/order
    wiki_doc: wiki/commerce-order/주문-생성/README.md

  - id: order-cancellation
    name: 주문 취소
    type: process
    summary: |
      POST /api/v1/orders/{orderId}/cancel.
      흐름: 재고 복구(product.increaseStock) → 쿠폰 복구 → OrderCancelledEvent(outbox 저장).
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/application/order
    wiki_doc: wiki/commerce-order/주문-생성/README.md

  - id: payment-processing
    name: 결제 처리
    type: process
    summary: |
      POST /api/v1/payments (결제 요청), POST /api/v1/payments/callback (PG 콜백 수신).
      PG 장애 시 CircuitBreaker 오픈 → Payment PENDING 유지 → PaymentScheduler(30초)가 재조회.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/interfaces/api/payment
    wiki_doc: wiki/commerce-order/결제-흐름/README.md

  - id: coupon-issuance
    name: 쿠폰 발급
    type: process
    summary: |
      POST /api/v1/coupons/{couponId}/issue (동기: 즉시 DB 저장),
      POST /api/v1/coupons/{couponId}/issue-async (비동기: Kafka coupon-issue-requests 발행),
      GET /api/v1/coupons/issue-requests/{requestId} (발급 요청 상태 조회),
      GET /api/v1/coupons/users/me/coupons (내 쿠폰 목록).
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/interfaces/api/coupon
    wiki_doc: wiki/commerce-order/쿠폰-규칙/README.md

relations:
  # 주문 생성 흐름
  - from: order-placement
    to: order
    type: produces
  - from: order-placement
    to: order-item
    type: produces
  - from: order-placement
    to: user-coupon
    type: consumes
    note: 쿠폰 검증 및 USED 상태로 전환
  - from: order-placement
    to: outbox-event
    type: produces
    note: OrderCreatedEvent → order-events 토픽
  - from: order-cancellation
    to: outbox-event
    type: produces
    note: OrderCancelledEvent → order-events 토픽

  # 결제 흐름
  - from: payment-processing
    to: payment
    type: produces
  - from: payment-processing
    to: pg-gateway
    type: depends_on
    note: OpenFeign + CircuitBreaker + Retry

  # 쿠폰 발급
  - from: coupon-issuance
    to: user-coupon
    type: produces
    note: 동기 발급 시 즉시 생성
  - from: coupon-issuance
    to: kafka
    type: produces
    note: 비동기 발급 시 coupon-issue-requests 토픽 발행

  # 아웃박스
  - from: outbox-event
    to: kafka
    type: produces
    note: OutboxScheduler가 1초마다 PENDING 레코드 → Kafka 발행

  # 데이터 구조
  - from: order
    to: order-item
    type: owns

  # 인프라 배포
  - from: order
    to: mysql
    type: deployed_in
  - from: order-item
    to: mysql
    type: deployed_in
  - from: payment
    to: mysql
    type: deployed_in
  - from: coupon
    to: mysql
    type: deployed_in
  - from: user-coupon
    to: mysql
    type: deployed_in
  - from: coupon-issue-request
    to: mysql
    type: deployed_in
  - from: outbox-event
    to: mysql
    type: deployed_in
