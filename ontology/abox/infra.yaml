# ontology/abox/infra.yaml
# 공유 인프라 인스턴스. 도메인 abox의 relation에서 참조한다.

entities:
  - id: mysql
    name: MySQL 8.0
    type: infra
    summary: |
      전 앱 공통 영속 저장소. modules/jpa가 DataSource·JPA·QueryDSL 설정을 공유.
      소프트 딜리트(deleted_at) 공통 적용, BaseEntity(id, created_at, updated_at, deleted_at).

  - id: redis
    name: Redis (Master/Replica)
    type: infra
    summary: |
      상품 캐시(productDetail TTL 10분, productList TTL 5분),
      대기열 ZSet(queue:waiting), 입장 토큰(queue:token:{userId}),
      실시간 랭킹 ZSet. modules/redis가 Master/Replica 설정 공유.

  - id: kafka
    name: Kafka
    type: infra
    summary: |
      토픽: catalog-events, order-events, coupon-issue-requests (+ 각 DLQ).
      modules/kafka가 Producer/Consumer 공통 설정 및 메시지 레코드(CatalogEventMessage, OrderEventMessage) 정의.
      Consumer: BATCH_LISTENER, Manual ACK, Concurrency=3, 최대 3000건/폴링.

  - id: pg-gateway
    name: PG (결제 게이트웨이)
    type: external
    summary: |
      외부 결제 대행사. OpenFeign + Resilience4j(CircuitBreaker: pgCircuitBreaker, Retry: pgRetry) 연동.
      장애 시 Payment를 PENDING 유지, PaymentScheduler가 30초마다 PG 재조회.
      CardType: SAMSUNG, KB, HYUNDAI, KAKAO, TOSS, NAVER.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-api/src/main/java/com/loopers/infrastructure/pg

  - id: spring-batch
    name: Spring Batch
    type: infra
    summary: |
      MetricsSnapshotJob(매일 00:05): product_metrics → product_metrics_daily 증분 스냅샷.
      RankingCarryOverScheduler(매일 23:50): Redis 랭킹 당일 점수 10% 이월.
      RankingAggregationJob(commerce-batch): 주간/월간 랭킹 집계 → mv_product_rank_weekly/monthly.
    repo: letsgojh0810/commerce-backend
    package: apps/commerce-batch
